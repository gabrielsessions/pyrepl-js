<body>

    <h1 style="text-align:center">Example 2: Print a message</h1>
    <div id="root"></div> <br>

    <label for="message">Enter a message: </label>
    <input type="text" id="message" name="message" ><br> <br>
    <label for="seconds">Number of seconds: </label>
    <input type="number" id="seconds" name="seconds" ><br> <br>
    <button onclick="showText()">Show on Hub Display</button>


    <script>
        function showText() {
            console.log("click")
            
            var message = document.getElementById("message").value;
            var seconds = document.getElementById("seconds").value;

            window.pyrepl.write = `import display
display.display_text_for_time("${message}", ${seconds * 1000}, 100)`
        }
    </script>
